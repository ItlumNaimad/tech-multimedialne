<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg" id="chatbot-avatar-svg">
  <circle cx="75" cy="75" r="70" fill="#ecf0f1" stroke="#3498db" stroke-width="5" />
  <circle cx="50" cy="60" r="10" fill="#2c3e50" id="eye-l" />
  <circle cx="100" cy="60" r="10" fill="#2c3e50" id="eye-r" />
  <path d="M 50 100 Q 75 120 100 100" fill="none" stroke="#e74c3c" stroke-width="5" id="mouth" />
  <style>
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    #eye-l, #eye-r { animation: blink 4s infinite; transform-origin: center; }
    .talking { animation: talk 0.5s infinite; }
    @keyframes talk {
      0% { d: path("M 50 100 Q 75 120 100 100"); }
      50% { d: path("M 50 100 Q 75 80 100 100"); }
      100% { d: path("M 50 100 Q 75 120 100 100"); }
    }
  </style>
</svg>
